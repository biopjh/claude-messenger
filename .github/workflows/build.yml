name: Build & Release

# 트리거:
#   - tag push (v0.2.0 형태) → 정식 릴리스 빌드 + GitHub Releases 업로드 + 자동 업데이트 발행
#   - 수동 (workflow_dispatch) → 동일 동작
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Releases 생성/수정에는 contents:write 권한이 필요
permissions:
  contents: write

jobs:
  release:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # Electron 바이너리(약 100MB) 캐시로 두 번째 빌드부터 빠르게
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ matrix.os }}-electron-${{ hashFiles('client/package-lock.json') }}
          restore-keys: |
            ${{ matrix.os }}-electron-

      - name: Install dependencies
        working-directory: client
        # npm ci 는 package-lock.json 과 package.json 의 엄격한 일치를 요구하므로
        # 학습 단계에서는 npm install 이 더 관대해서 안전. (락 파일이 있으면 그대로 사용)
        run: npm install --no-audit --no-fund

      # 코드 사이닝 secrets 가 등록되어 있을 때만 env 로 주입.
      # (빈 값을 그대로 env 에 두면 electron-builder Windows 빌드가
      #  CSC_LINK 를 빈 경로로 해석해 실패하므로 반드시 분리한다.)
      - name: Configure code signing (only if secrets are set)
        shell: bash
        env:
          IN_CSC_LINK: ${{ secrets.CSC_LINK }}
          IN_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          IN_APPLE_ID: ${{ secrets.APPLE_ID }}
          IN_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          IN_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$IN_CSC_LINK" ]; then
            echo "CSC_LINK=$IN_CSC_LINK"               >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$IN_CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "→ code signing enabled"
          else
            echo "→ code signing skipped (no CSC_LINK secret)"
          fi
          if [ -n "$IN_APPLE_ID" ]; then
            echo "APPLE_ID=$IN_APPLE_ID"                                       >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=$IN_APPLE_APP_SPECIFIC_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$IN_APPLE_TEAM_ID"                             >> "$GITHUB_ENV"
            echo "→ macOS notarization enabled"
          fi

      - name: Build & publish (${{ matrix.platform }})
        working-directory: client
        env:
          # GITHUB_TOKEN 은 actions 가 자동으로 주입. electron-builder 가 이걸 GH_TOKEN 으로 쓴다.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} --config ../installer/electron-builder.yml --publish always
