# electron-builder 설정.
# 호출:  cd client && npm run dist[:mac|:win|:linux]
# 산출:  installer/dist/  (Messenger-x.y.z-arch.dmg / Messenger-x.y.z-Setup.exe / ...)
#
# 경로 규칙 (electron-builder):
#   buildResources / output 은 package.json 위치(=client/) 기준 상대경로
#   buildResources 안의 icon 파일은 그 폴더 내 상대경로

appId: com.example.messenger
productName: Messenger
copyright: "Copyright © 2026 ${author}"

directories:
  buildResources: ../installer/build      # icon.png / icon.ico 가 있는 곳
  output: ../installer/dist               # 빌드 산출물 (.dmg / .exe / .AppImage)

# 패키지에 포함할 파일 (whitelist)
files:
  - "src/**/*"
  - "assets/**/*"
  - "package.json"
  - "!**/*.md"
  - "!**/.DS_Store"
  - "!**/.git*"
  - "!**/node_modules/.cache/**"

# ─────────────────── macOS (.dmg) ───────────────────
mac:
  target:
    - target: dmg
      arch: [x64, arm64]                  # Intel + Apple Silicon 둘 다
  category: public.app-category.social-networking
  icon: icon.png                           # buildResources/icon.png
  # 코드 사이닝 없이 (개인 학습용). 운영 배포 시엔 다음을 채울 것:
  #   identity: "Developer ID Application: Your Name (TEAMID)"
  #   hardenedRuntime: true
  #   entitlements: ../installer/build/entitlements.mac.plist
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  # 기본 DMG 배경을 그대로 쓰지만, 커스텀 배경은 buildResources/background.png 두면 자동 적용.

# ─────────────────── Windows (.exe NSIS) ───────────────────
win:
  target:
    - target: nsis
      arch: [x64]
  icon: icon.ico

nsis:
  oneClick: false                          # 인스톨 위치/단축키 선택 가능
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Messenger
  uninstallDisplayName: Messenger
  perMachine: false                        # 사용자별 설치 — 관리자권한 불필요
  artifactName: "${productName}-${version}-Setup.${ext}"

# ─────────────────── Linux (.AppImage) ───────────────────
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Network
  icon: icon.png
  artifactName: "${productName}-${version}.${ext}"
  desktop:
    Name: Messenger
    Comment: PC 데스크톱 메신저 클라이언트
    Categories: Network;Chat;

# 자동 업데이트 — GitHub Releases 를 publish 채널로 사용.
# (electron-updater 가 latest.yml/latest-mac.yml/latest-linux.yml 을 여기서 찾는다)
# CI 에서 `--publish always` 를 주면 이 설정대로 자동 업로드.
# 수동 발행 시엔 환경변수 GH_TOKEN(write 권한) 가 필요.
publish:
  provider: github
  owner: biopjh                    # ← 본인 GitHub 사용자명/조직명으로 교체
  repo: claude-messenger           # ← 본인 저장소 이름으로 교체
  releaseType: release             # 'draft' 로 두면 release 가 draft 로 생성되어 수동 publish 필요
