# 로컬에서 docker compose up -d 한 번이면 앱 + Postgres 가 함께 뜬다.
# (개발자 PC 의 PostgreSQL 과 충돌하지 않도록 5433 으로 노출)

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: messenger
      POSTGRES_PASSWORD: messenger
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messenger -d messenger"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/messenger
      SPRING_DATASOURCE_USERNAME: messenger
      SPRING_DATASOURCE_PASSWORD: messenger
      JWT_SECRET: change-me-please-change-me-please-change-me-32+chars
      FILE_UPLOAD_DIR: /app/var/uploads
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/var/uploads

volumes:
  pgdata:
  uploads:
