spring:
  application:
    name: messenger
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/springboot}
    username: ${SPRING_DATASOURCE_USERNAME:biopjh}
    password: ${SPRING_DATASOURCE_PASSWORD:8919}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.messenger
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    jdbc-type-for-null: NULL

jwt:
  # 운영에서는 환경변수 JWT_SECRET 으로 반드시 교체 (HS256은 256비트=32바이트 이상)
  secret: ${JWT_SECRET:please-change-me-please-change-me-32+chars-please}
  access-token-validity-seconds: 3600        # 1시간
  refresh-token-validity-seconds: 1209600    # 14일

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    com.example.messenger: DEBUG
    org.mybatis: INFO
    org.springframework.security: INFO
