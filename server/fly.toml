# Fly.io 배포 설정.
#  최초 1회: `fly launch --no-deploy --copy-config` 한 뒤 이 파일을 그대로 두고
#           `fly volumes create messenger_uploads --size 1`,
#           `fly secrets set JWT_SECRET=... DB_URL=... DB_USER=... DB_PASS=...`,
#           `fly postgres create` 또는 외부 관리형 Postgres URL 등록,
#  배포     : `fly deploy`

app = "messenger"          # ← fly launch 시 본인 앱 이름으로 자동 변경됨
primary_region = "nrt"     # 도쿄. 한국에서 가장 가까움.

[build]
  dockerfile = "Dockerfile"

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  SERVER_PORT = "8080"
  FILE_UPLOAD_DIR = "/app/var/uploads"
  TZ = "Asia/Seoul"

# 영속 디스크 — 업로드된 이미지/파일은 여기에 저장
[[mounts]]
  source      = "messenger_uploads"
  destination = "/app/var/uploads"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period  = "30s"
    interval      = "15s"
    timeout       = "5s"
    method        = "GET"
    path          = "/login"
    # actuator 를 추가하면 path = "/actuator/health" 로 바꾸기를 권장

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory_mb = 512
