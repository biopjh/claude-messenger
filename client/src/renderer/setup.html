<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Messenger 설정</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "맑은 고딕", "Malgun Gothic", sans-serif;
      background: #f3f4f6; color: #111827; }
    body { display: flex; align-items: center; justify-content: center; }
    .card {
      background: #fff; padding: 28px 32px; border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,.08);
      width: min(440px, 92vw);
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p.lead { margin: 0 0 18px; font-size: 13px; color: #4b5563; }
    label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 6px; }
    input[type=text], input[type=url] {
      width: 100%; padding: 10px 12px;
      border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px;
    }
    input:focus { outline: 2px solid #2563eb; border-color: transparent; }
    .examples { font-size: 12px; color: #9ca3af; margin-top: 6px; }
    .examples code { background:#f3f4f6; padding: 1px 6px; border-radius: 4px; font-size: 11px; }
    .actions {
      margin-top: 20px; display: flex; gap: 10px; align-items: center;
    }
    button.primary {
      padding: 10px 18px; background: #2563eb; color: #fff;
      border: 0; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button.primary:hover { background: #1d4ed8; }
    button.primary:disabled { background: #9ca3af; cursor: progress; }
    button.ghost {
      padding: 10px 14px; background: #f3f4f6; color: #374151;
      border: 0; border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .msg { font-size: 13px; min-height: 18px; }
    .msg.error { color: #dc2626; }
    .msg.info  { color: #6b7280; }
    .alert {
      margin-bottom: 14px; padding: 10px 12px; border-radius: 8px;
      background: #fef2f2; color: #b91c1c; font-size: 13px;
    }
    .alert.hidden { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>서버 주소 설정</h1>
    <p class="lead">접속할 Messenger 서버 주소를 입력하세요. 나중에 메뉴 → 설정에서 다시 바꿀 수 있습니다.</p>

    <div id="alert" class="alert hidden"></div>

    <label for="urlInput">서버 URL</label>
    <input id="urlInput" type="url" placeholder="http://localhost:8080" autofocus>
    <p class="examples">
      예) <code>http://localhost:8080</code> ·
      <code>https://your-app.fly.dev</code>
    </p>

    <div class="actions">
      <button id="saveBtn" class="primary" type="button">저장하고 연결</button>
      <button id="useDefaultBtn" class="ghost" type="button">기본값 사용</button>
      <span id="msg" class="msg"></span>
    </div>
  </main>

  <script>
    const DEFAULT = 'http://localhost:8080';
    const params = new URLSearchParams(location.search);
    const $ = (id) => document.getElementById(id);

    (async function init() {
      // 메뉴에서 ‘URL 변경’으로 들어왔으면 기존 값을 채워둔다.
      try {
        const current = await window.messengerNative.setup.getUrl();
        $('urlInput').value = params.get('current') || current || '';
      } catch {}

      // 서버 미접속으로 들어온 경우 알림 표시
      if (params.get('error') === 'unreachable') {
        const u = params.get('url') || '';
        const a = $('alert');
        a.textContent = `${u} 에 연결할 수 없습니다. 서버가 실행 중인지 확인하세요.`;
        a.classList.remove('hidden');
      }
    })();

    $('saveBtn').addEventListener('click', save);
    $('useDefaultBtn').addEventListener('click', () => { $('urlInput').value = DEFAULT; save(); });
    $('urlInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') save(); });

    async function save() {
      const url = $('urlInput').value.trim();
      const msg = $('msg');
      msg.className = 'msg info'; msg.textContent = '';
      if (!url) { msg.className = 'msg error'; msg.textContent = 'URL을 입력하세요.'; return; }
      $('saveBtn').disabled = true;
      try {
        await window.messengerNative.setup.saveUrl(url);
        // saveUrl 직후 main 이 자동으로 해당 URL 을 loadURL 한다.
        msg.textContent = '연결 중…';
      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = e?.message || '저장에 실패했습니다.';
        $('saveBtn').disabled = false;
      }
    }
  </script>
</body>
</html>
