<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>알림</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "맑은 고딕", "Malgun Gothic", sans-serif;
      cursor: pointer;
      user-select: none;
    }
    .card {
      width: 100%; height: 100%;
      background: rgba(31, 41, 55, 0.96);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 10px;
      box-shadow: 0 12px 24px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.06);
      padding: 12px 14px;
      color: #f9fafb;
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      transform: translateX(20px);
      transition: opacity 220ms ease-out, transform 220ms ease-out;
    }
    .card.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }
    .title {
      font-size: 13px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }
    .badge {
      font-size: 10px; padding: 1px 6px;
      background: rgba(37, 99, 235, .25); color: #93c5fd;
      border-radius: 999px; flex-shrink: 0;
    }
    .body {
      font-size: 12px; color: rgba(255,255,255,.85);
      line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="head">
      <div class="title" id="title">…</div>
      <div class="badge">Messenger</div>
    </div>
    <div class="body" id="body">…</div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const title = params.get('title') || '';
    const body  = params.get('body')  || '';
    const durationMs = Math.max(2000, Number(params.get('durationMs')) || 5000);

    document.getElementById('title').textContent = title;
    document.getElementById('body').textContent  = body;

    const card = document.getElementById('card');
    // 페이드인
    requestAnimationFrame(() => card.classList.add('visible'));

    // 자동 닫기 타이머 — hover 동안 일시정지
    let remaining = durationMs;
    let lastStart = Date.now();
    let timer = null;

    function startTimer() {
      lastStart = Date.now();
      timer = setTimeout(fadeOutAndClose, remaining);
    }
    function pauseTimer() {
      if (timer) {
        clearTimeout(timer); timer = null;
        remaining -= (Date.now() - lastStart);
        if (remaining < 500) remaining = 500;
      }
    }
    function fadeOutAndClose() {
      card.classList.remove('visible');
      setTimeout(() => window.messengerNative?.toast?.close?.(), 240);
    }

    document.addEventListener('mouseenter', pauseTimer);
    document.addEventListener('mouseleave', startTimer);

    document.addEventListener('click', () => {
      // main 프로세스가 메인창 포커스 + 채팅방 이동 처리
      window.messengerNative?.toast?.click?.();
    });

    startTimer();
  </script>
</body>
</html>
